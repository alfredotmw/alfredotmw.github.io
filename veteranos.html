<title>Veteranos A — Cuotas Económicas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f2f2f0;color:#1a1a1a;font-size:14px}
:root{--negro:#1a1a1a;--amarillo:#f5c500;--amarillo-claro:#fff8d6;--amarillo-borde:#e6b800;--gris-borde:#e0ddd5}
.container{max-width:700px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 16px 16px;margin-bottom:16px;background:var(--negro);border-radius:14px;color:#fff}
.header img{width:80px;height:80px;object-fit:contain;display:block;margin:0 auto 8px}
.header h1{font-size:20px;font-weight:700;color:var(--amarillo)}
.header p{font-size:12px;color:#aaa;margin-top:4px}
.tabs{display:flex;margin-bottom:16px;border-bottom:3px solid var(--amarillo)}
.tab{flex:1;padding:9px 0;cursor:pointer;font-size:13px;text-align:center;border-bottom:3px solid transparent;margin-bottom:-3px;color:#888;font-weight:600}
.tab.active{border-bottom-color:var(--negro);color:var(--negro);background:var(--amarillo-claro)}
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.metric{background:var(--negro);border-radius:10px;padding:12px 14px}
.metric .lbl{font-size:11px;color:#aaa;margin-bottom:3px}
.metric .val{font-size:20px;font-weight:700;color:var(--amarillo)}
.card{background:#fff;border:0.5px solid var(--gris-borde);border-radius:12px;padding:16px;margin-bottom:14px}
.card h3{font-size:12px;font-weight:700;color:var(--negro);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px;border-left:4px solid var(--amarillo);padding-left:8px}
.chart-wrap{position:relative;height:200px;width:100%}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}}
.sf-wrap{overflow-x:auto}
.sf-table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
.sf-table th{padding:5px 4px;text-align:center;font-weight:700;color:var(--negro);font-size:10px;background:var(--amarillo-claro);border-bottom:2px solid var(--amarillo);white-space:nowrap}
.sf-table th.left{text-align:left;padding-left:6px}
.sf-table td{padding:5px 3px;text-align:center;border-bottom:0.5px solid #f0f0ec}
.sf-table tr:hover td{background:#fffbea}
.sf-table td.name{text-align:left;padding-left:6px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.sf-table td.name:hover{color:var(--amarillo-borde)}
.dot{width:16px;height:16px;border-radius:50%;display:inline-block;vertical-align:middle}
.dot.ok{background:#4caf50}.dot.mal{background:#f44336}.dot.na{background:#ddd}
.legend{display:flex;gap:14px;margin-bottom:10px;font-size:11px;color:#777;flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:5px}
.pub-card{background:#fff;border:0.5px solid var(--gris-borde);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.pub-card:hover{border-color:var(--amarillo)}
.pub-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pub-nombre{font-weight:700;font-size:13px;cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.pub-nombre:hover{color:var(--amarillo-borde)}
.pub-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.pub-badge.ok{background:#e8f5e9;color:#2e7d32}
.pub-badge.mal{background:#ffebee;color:#c62828}
.pub-chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.chip.ok{background:#e8f5e9;color:#2e7d32}.chip.mal{background:#ffebee;color:#c62828}
.pub-resumen{background:var(--negro);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px;color:#fff}
.pub-resumen .big{font-size:32px;font-weight:800;color:var(--amarillo)}
.pub-resumen .sub{font-size:12px;color:#aaa;margin-top:2px}
.msg-box{background:#f5f5f2;border-radius:8px;padding:14px;font-size:12px;white-space:pre-wrap;line-height:1.7;font-family:monospace;max-height:280px;overflow-y:auto;margin-bottom:10px;border:0.5px solid var(--gris-borde)}
.btn{border:2px solid var(--negro);border-radius:6px;padding:7px 16px;font-size:13px;background:var(--amarillo);cursor:pointer;font-weight:700;color:var(--negro)}
.btn:hover{background:var(--amarillo-borde)}
.copy-ok{color:#2e7d32;font-size:12px;margin-left:8px}
.loader{text-align:center;padding:40px;color:#aaa;font-size:13px}
.spinner{width:28px;height:28px;border:3px solid #e0e0d8;border-top-color:var(--amarillo);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:999;justify-content:center;align-items:center}
.modal-bg.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:20px;width:90%;max-width:380px;max-height:78vh;overflow-y:auto;position:relative}
.modal-titulo{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--negro);border-left:4px solid var(--amarillo);padding-left:8px;padding-right:30px}
.modal-cerrar{position:absolute;top:16px;right:16px;cursor:pointer;font-size:22px;color:#aaa;background:none;border:none}
.modal-fila{padding:7px 0;border-bottom:0.5px solid #f0f0ec}
.modal-fila:last-child{border:none}
.modal-fila-top{display:flex;justify-content:space-between;font-size:13px}
.modal-fila.total .modal-fila-top{font-weight:700;border-top:2px solid #eee;margin-top:4px;padding-top:8px}
.modal-fecha{font-size:11px;color:#888;margin-top:2px}
</style>
</head>

<script>

var SHEET_ID='2PACX-1vQw1QxbxrBRS-0l_QjM0Xce-WzueMrV8lyDkHnx3lb4oRh2i3A66eHlrFajlipv-geB02dXeIr76Akz';

var MESES_2026=["01-2026","02-2026","03-2026","04-2026","05-2026","06-2026","07-2026","08-2026","09-2026","10-2026","11-2026","12-2026"];
var NM=["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

var RESUMEN={

};

var GASTOS_2026=[
  {d:"2026-03-07",imp:-55000},{d:"2026-03-14",imp:-55000},{d:"2026-03-21",imp:-55000},{d:"2026-03-28",imp:-55000},
  {d:"2026-04-04",imp:-55000},{d:"2026-04-11",imp:-55000},{d:"2026-04-18",imp:-55000},{d:"2026-04-25",imp:-55000},
  {d:"2026-05-02",imp:-55000},{d:"2026-05-09",imp:-55000},{d:"2026-05-16",imp:-55000},{d:"2026-05-23",imp:-55000},
  {d:"2026-06-06",imp:-55000},{d:"2026-06-13",imp:-55000},{d:"2026-06-20",imp:-55000}
];

// Recaudación lograda por fecha real de pago (fuente: resumen del Sheet)
var LOGRADO_REAL={
  "01-2026":390000,
  "02-2026":510000,
  "03-2026":1314000,
  "04-2026":1140000,
  "05-2026":745000,
  "06-2026":1260000
};
var chartBar=null, chartGastos=null;

function fmt(n){return'$'+Math.round(n).toLocaleString('es-AR');}
function mesLabel(m){var p=m.split('-');return NM[parseInt(p[0])]+' '+p[1].substring(2);}
function esPagado(val,std){return val>0&&val>=(std*0.5);}

function parseFecha(str){
  if(!str) return'';
  str=str.trim();
  var m=str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  return str.substring(0,10);
}
function parseMes(str){
  if(!str) return null;
  str=str.trim();
  var m=str.match(/^(\d{2})[-\/](\d{4})$/);
  return m?m[1]+'-'+m[2]:null;
}
function parseImp(str){
  if(!str) return 0;
  str=str.toString().replace(/\$/g,'').replace(/\./g,'').replace(/,/g,'.').replace(/\s/g,'');
  var n=parseFloat(str);
  return isNaN(n)?0:n;
}

var EXCLUIDOS=["PUJOL","DE ASSIS","DE LA TORRE","ENCINA","FRETTE","GARCIA GUILLERMO",
  "LEGUIZAMON","OJEDA","PAREDES","PAZOS","GRACHOT","ROMERO VALDEZ",
  "SEGUNDO","TORRES LUCAS","YUNIS","ZAMUDIO","COLMAN","GIMENEZ ALBERTO"];

function estaExcluido(nombre){
  var n=nombre.toUpperCase();
  return EXCLUIDOS.some(function(e){return n.indexOf(e)>=0;});
}

function procesarCSV(rows){
  PAGOS_DETALLE={};
  rows.forEach(function(r){
    var tipo=(r[1]||'').trim().toUpperCase();
    if(tipo!=='JUGADOR') return;
    var jug=(r[2]||'').trim();
    if(!jug||estaExcluido(jug)) return;
    var fecha=parseFecha(r[0]);
    if(!fecha||fecha.substring(0,4)!=='2026') return; // solo pagos con fecha 2026
    var imp=parseImp(r[4]);
    if(imp<=0) return;
    var mes=parseMes(r[3]);
    if(!PAGOS_DETALLE[jug]) PAGOS_DETALLE[jug]=[];
    PAGOS_DETALLE[jug].push({fecha:fecha,mes:mes,importe:imp});
  });
}

function dotClass(j,m){
  var mmap=RESUMEN[j]||{};
  var std=CUOTA_STD[m]||60000;
  var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
  var inicio=primero||MES_INICIO;
  var idxP=MESES_2026.indexOf(inicio);
  var idxM=MESES_2026.indexOf(m);
  if(idxM<idxP) return'na';
  return esPagado(mmap[m]||0,std)?'ok':'mal';
}

function tieneDeuda(j){
  var mmap=RESUMEN[j]||{};
  var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
  var inicio=primero||MES_INICIO;
  var idxI=MESES_2026.indexOf(inicio);
  var idxF=MESES_2026.indexOf(MES_ACTUAL);
  return MESES_2026.slice(idxI,idxF+1).some(function(m){return!esPagado(mmap[m]||0,CUOTA_STD[m]||60000);});
}

function abrirModal(j){
  var mmap=RESUMEN[j]||{};
  var detalle=PAGOS_DETALLE[j]||[];
  var mesesVis=MESES_2026.slice(0,MESES_2026.indexOf(MES_ACTUAL)+1);
  var porMes={};
  detalle.forEach(function(p){
    if(!porMes[p.mes]) porMes[p.mes]=[];
    porMes[p.mes].push(p);
  });
  document.getElementById('modalTitulo').textContent=j;
  var html='';
  var total=0;
  var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
  var inicio=primero||MES_INICIO;
  mesesVis.forEach(function(m){
    if(MESES_2026.indexOf(m)<MESES_2026.indexOf(inicio)) return;
    var v=mmap[m]||0;
    var std=CUOTA_STD[m]||60000;
    var icon=esPagado(v,std)?'✅':'❌';
    var pagos=porMes[m]||[];
    var fechaHtml='';
    if(pagos.length>0){
      fechaHtml='<div class="modal-fecha">'+pagos.map(function(p){return p.fecha+' — '+fmt(p.importe);}).join('<br>')+'</div>';
    }
    html+='<div class="modal-fila"><div class="modal-fila-top"><span>'+icon+' '+NML[parseInt(m.split('-')[0])]+' '+m.split('-')[1]+'</span><span style="font-weight:600">'+(v>0?fmt(v):'Sin pago')+'</span></div>'+fechaHtml+'</div>';
    total+=v;
  });
  if(total>0) html+='<div class="modal-fila total"><div class="modal-fila-top"><span>Total pagado 2026</span><span>'+fmt(total)+'</span></div></div>';
  if(!html) html='<p style="color:#aaa;font-size:13px;padding:8px 0">Sin pagos registrados en 2026</p>';
  document.getElementById('modalCuerpo').innerHTML=html;
  document.getElementById('modalBg').classList.add('open');
}

function cerrarModal(){document.getElementById('modalBg').classList.remove('open');}
document.getElementById('modalCerrar').addEventListener('click',cerrarModal);
document.getElementById('modalBg').addEventListener('click',function(e){if(e.target===this)cerrarModal();});

function setTab(t){
  document.getElementById('tabBtnPub').classList.toggle('active',t==='pub');
  document.getElementById('tabBtnAdmin').classList.toggle('active',t==='admin');
  document.getElementById('tabPub').style.display=t==='pub'?'':'none';
  document.getElementById('tabAdmin').style.display=t==='admin'?'':'none';
}

function renderTodo(){
  var jugadores=Object.keys(RESUMEN).sort();
  var hoy=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});
  var mesNombre=NML[parseInt(MES_ACTUAL.split('-')[0])]+' '+MES_ACTUAL.split('-')[1];
  document.getElementById('fechaHeader').textContent='Estado al '+hoy+' · '+mesNombre;

  var totalIn=jugadores.reduce(function(s,j){return s+Object.values(RESUMEN[j]).reduce(function(a,v){return a+v;},0);},0);
  var totalOut=GASTOS_2026.reduce(function(s,r){return s+r.imp;},0);
  var alDia=jugadores.filter(function(j){return!tieneDeuda(j);}).length;

  document.getElementById('metrics').innerHTML=
    '<div class="metric"><div class="lbl">Recaudado 2026</div><div class="val">'+fmt(totalIn)+'</div></div>'+
    '<div class="metric"><div class="lbl">Gastos</div><div class="val" style="color:#f44336">'+fmt(Math.abs(totalOut))+'</div></div>'+
    '<div class="metric"><div class="lbl">Balance</div><div class="val" style="color:'+(totalIn+totalOut>=0?'#4caf50':'#f44336')+'">'+fmt(totalIn+totalOut)+'</div></div>'+
    '<div class="metric"><div class="lbl">Al día / Total</div><div class="val">'+alDia+' / '+jugadores.length+'</div></div>';

  var mesesVis=MESES_2026.slice(0,MESES_2026.indexOf(MES_ACTUAL)+1);

  // Recaudación esperada
  var esperado=mesesVis.map(function(m){
    var std=CUOTA_STD[m]||60000;
    var activos=jugadores.filter(function(j){
      var mmap=RESUMEN[j]||{};
      var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
      var inicio=primero||MES_INICIO;
      return MESES_2026.indexOf(m)>=MESES_2026.indexOf(inicio);
    }).length;
    return activos*std;
  });

  // Recaudación lograda por fecha real de pago (excluye jugadores no activos)
  var logrado=mesesVis.map(function(){return 0;});
  Object.keys(PAGOS_DETALLE).forEach(function(j){
    (PAGOS_DETALLE[j]||[]).forEach(function(p){
      if(!p.fecha||p.fecha.length<7) return;
      var anio=p.fecha.substring(0,4);
      var mes=p.fecha.substring(5,7);
      var mesKey=mes+'-'+anio;
      var idx=mesesVis.indexOf(mesKey);
      if(idx>=0) logrado[idx]+=p.importe;
    });
  });

  if(chartBar) chartBar.destroy();
  chartBar=new Chart(document.getElementById('chartBar'),{
    type:'bar',
    data:{
      labels:mesesVis.map(mesLabel),
      datasets:[
        {label:'Esperado',data:esperado,backgroundColor:'#e0ddd5',borderRadius:3,borderSkipped:false},
        {label:'Logrado',data:logrado,backgroundColor:'#f5c500',borderRadius:3,borderSkipped:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:12}},
        tooltip:{callbacks:{label:function(v){return v.dataset.label+': '+fmt(v.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},
        y:{ticks:{callback:function(v){return'$'+Math.round(v/1000)+'k';}},grid:{color:'#f0f0ec'}}}}
  });

  // Gastos por fecha real
  var gastosMap={};
  GASTOS_2026.forEach(function(r){
    var k=r.d.substring(0,7);
    var p=k.split('-');
    var mk=p[1]+'-'+p[0];
    gastosMap[mk]=(gastosMap[mk]||0)+Math.abs(r.imp);
  });
  var gM=Object.keys(gastosMap).sort(function(a,b){
    var ta=a.split('-')[1]+a.split('-')[0];
    var tb=b.split('-')[1]+b.split('-')[0];
    return ta.localeCompare(tb);
  });
  if(chartGastos) chartGastos.destroy();
  chartGastos=new Chart(document.getElementById('chartGastos'),{
    type:'bar',
    data:{labels:gM.map(mesLabel),datasets:[{data:gM.map(function(m){return gastosMap[m];}),backgroundColor:'#e53935',borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(v){return fmt(v.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{callback:function(v){return'$'+Math.round(v/1000)+'k';}},grid:{color:'#f0f0ec'}}}}
  });

  // Semáforo
  var sfHtml='<thead><tr><th class="left">Jugador</th>';
  mesesVis.forEach(function(m){sfHtml+='<th>'+NM[parseInt(m.split('-')[0])]+'</th>';});
  sfHtml+='<th>Estado</th></tr></thead><tbody>';
  jugadores.forEach(function(j){
    var jEsc=j.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    sfHtml+='<tr><td class="name" onclick="abrirModal(\''+jEsc+'\')">'+j+'</td>';
    var deudas=0;
    mesesVis.forEach(function(m){var c=dotClass(j,m);if(c==='mal')deudas++;sfHtml+='<td><span class="dot '+c+'"></span></td>';});
    sfHtml+='<td style="font-size:11px;font-weight:700;color:'+(deudas===0?'#2e7d32':'#c62828')+';white-space:nowrap">'+(deudas===0?'✅ Al día':'⚠️ '+deudas+' mes'+(deudas>1?'es':''))+'</td></tr>';
  });
  sfHtml+='</tbody>';
  document.getElementById('sfTable').innerHTML=sfHtml;

  // Mensaje
  var deudores=[];
  jugadores.forEach(function(j){
    var mmap=RESUMEN[j]||{};
    var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
    var inicio=primero||MES_INICIO;
    var idxI=MESES_2026.indexOf(inicio);
    var idxF=MESES_2026.indexOf(MES_ACTUAL);
    var deberia=MESES_2026.slice(idxI,idxF+1);
    var mesesDeuda=deberia.filter(function(m){return!esPagado(mmap[m]||0,CUOTA_STD[m]||60000);});
    if(mesesDeuda.length>0){
      deudores.push({
        j:j,
        lista:mesesDeuda.map(function(m){return NML[parseInt(m.split('-')[0])];}).join(', '),
        total:mesesDeuda.reduce(function(s,m){return s+(CUOTA_STD[m]||60000)-(mmap[m]||0);},0)
      });
    }
  });

  var msg='';
  if(deudores.length===0){
    msg='✅ ¡Todos al día!';
  } else {
    msg='⚽ *VETERANOS A — ECONÓMICAS*\n📋 Cuotas pendientes al '+hoy+'\n━━━━━━━━━━━━━━━━━━━━\n\n';
    deudores.forEach(function(d,i){
      msg+=(i+1)+'. *'+d.j+'*\n   • '+d.lista+'\n   💰 '+fmt(d.total)+'\n\n';
    });
    msg+='━━━━━━━━━━━━━━━━━━━━\n👥 '+deudores.length+' jugador'+(deudores.length>1?'es':'')+' con deuda';
  }
  document.getElementById('msgBox').textContent=msg;
  window._msg=msg;

  // Vista pública
  var conDeuda=jugadores.filter(function(j){return tieneDeuda(j);}).length;
  document.getElementById('pubResumen').innerHTML=
    '<div class="big">'+alDia+' / '+jugadores.length+'</div>'+
    '<div class="sub">jugadores al día en '+mesNombre+'</div>'+
    (conDeuda>0?'<div style="color:#f44336;font-weight:700;margin-top:6px;font-size:13px">⚠️ '+conDeuda+' con cuotas pendientes</div>':
    '<div style="color:#4caf50;font-weight:700;margin-top:6px;font-size:13px">✅ ¡Todos al día!</div>');

  var sorted=jugadores.slice().sort(function(a,b){
    var da=tieneDeuda(a),db=tieneDeuda(b);
    if(da&&!db) return 1; if(!da&&db) return -1; return a.localeCompare(b);
  });
  var pubHtml='';
  sorted.forEach(function(j){
    var mmap=RESUMEN[j]||{};
    var td=tieneDeuda(j);
    var primero=Object.keys(mmap).filter(function(x){return x.endsWith('2026')&&mmap[x]>0;}).sort()[0];
    var inicio=primero||MES_INICIO;
    var idxI=MESES_2026.indexOf(inicio);
    var idxF=MESES_2026.indexOf(MES_ACTUAL);
    var mesesDeuda=MESES_2026.slice(idxI,idxF+1).filter(function(m){return!esPagado(mmap[m]||0,CUOTA_STD[m]||60000);});
    var chips='';
    mesesVis.forEach(function(m){
      var c=dotClass(j,m);
      if(c==='na') return;
      chips+='<span class="chip '+(c==='ok'?'ok':'mal')+'">'+NM[parseInt(m.split('-')[0])]+'</span>';
    });
    var jEsc=j.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    pubHtml+='<div class="pub-card"><div class="pub-top">'+
      '<span class="pub-nombre" onclick="abrirModal(\''+jEsc+'\')">'+j+'</span>'+
      '<span class="pub-badge '+(td?'mal':'ok')+'">'+(td?'Adeuda '+mesesDeuda.length+' mes'+(mesesDeuda.length>1?'es':''):'Al día ✓')+'</span>'+
      '</div><div class="pub-chips">'+chips+'</div></div>';
  });
  document.getElementById('pubCards').innerHTML=pubHtml;
}

function copiar(){
  if(!window._msg) return;
  navigator.clipboard.writeText(window._msg).then(function(){
    var ok=document.getElementById('copyOk');
    ok.style.display='inline';
    setTimeout(function(){ok.style.display='none';},2500);
  });
}

function cargarConProxy(idx){
  if(idx>=PROXIES.length){
    document.getElementById('loader').style.display='none';
    document.getElementById('content').style.display='';
    renderTodo();
    return;
  }
  Papa.parse(PROXIES[idx],{
    download:true,skipEmptyLines:true,
    complete:function(r){
      if(!r.data||r.data.length<2){cargarConProxy(idx+1);return;}
      console.log('Filas cargadas:', r.data.length);
      procesarCSV(r.data);
      document.getElementById('loader').style.display='none';
      document.getElementById('content').style.display='';
      renderTodo();
    },
    error:function(){cargarConProxy(idx+1);}
  });
}

cargarConProxy(0);
</script>
</body>
</html>
